functions:
  - name: tts_generator
    description: >
      Convert narration text to speech audio using ElevenLabs API.
      Supports multiple voices, languages, and emotional tones.
    scope: personal
  - name: bgm_generator
    description: >
      Generate background music tracks for video production.
      Supports mood/genre specification and duration control.
    scope: personal
  - name: video_composer
    description: >
      Assemble final video from images/video clips, audio narration, BGM,
      and subtitles using ffmpeg. Supports illustrated and subtitle formats.
    scope: personal
  - name: image_generator
    description: >
      Generate illustrations from text prompts for visual novel scenes.
      Supports style references for visual consistency across chapters.
    scope: personal
  - name: video_clip_generator
    description: >
      Generate AI video clips from static images using PiAPI/Kling
      image-to-video API. Supports 5s and 10s durations.
    scope: personal
